<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>Masuk · VanX Stream</title>
  <meta name="description" content="Masuk ke VanX Stream — galeri streaming anime, drama, film, komik dengan tema Yunani klasik" />
  <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" />
  <style>
    /* ===== VanX Stream — Greek Classical Theme ===== */
    :root {
      --bg:           #0a0e1a;
      --bg-2:         #11172a;
      --bg-3:         #1a2138;
      --marble:       #f5f1e8;
      --marble-dim:   #e8e3d5;
      --card:         rgba(245, 241, 232, 0.04);
      --card-hover:   rgba(245, 241, 232, 0.08);
      --border:       rgba(245, 241, 232, 0.12);
      --border-2:     rgba(245, 241, 232, 0.2);
      --text:         #f5f1e8;
      --text-2:       rgba(245, 241, 232, 0.78);
      --text-3:       rgba(245, 241, 232, 0.55);
      --gold:         #d4af37;
      --gold-2:       #b8941f;
      --gold-light:   #f5d77a;
      --gold-soft:    rgba(212, 175, 55, 0.12);
      --gold-glow:    rgba(212, 175, 55, 0.35);
      --azure:        #4a7ba6;
      --crimson:      #9b1c1c;
      --serif:        'Cinzel', Georgia, serif;
      --serif-italic: 'Cormorant Garamond', 'EB Garamond', Georgia, serif;
      --sans:         'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      position: relative;
    }

    /* Layered background — animated gold dust + Greek pattern */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, var(--gold-soft), transparent 70%),
        radial-gradient(circle at 0% 100%, rgba(74, 123, 166, 0.12), transparent 50%),
        radial-gradient(circle at 100% 80%, rgba(199, 93, 60, 0.08), transparent 50%);
      z-index: -2;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg,
          transparent 0,
          transparent 60px,
          rgba(212, 175, 55, 0.02) 60px,
          rgba(212, 175, 55, 0.02) 61px),
        repeating-linear-gradient(-45deg,
          transparent 0,
          transparent 60px,
          rgba(212, 175, 55, 0.02) 60px,
          rgba(212, 175, 55, 0.02) 61px);
      z-index: -1;
      pointer-events: none;
    }

    /* Floating gold particles */
    .particle {
      position: fixed;
      width: 3px;
      height: 3px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      animation: float 12s linear infinite;
      box-shadow: 0 0 6px var(--gold-glow);
    }

    @keyframes float {
      0%   { transform: translateY(110vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
    }

    /* ===== Container ===== */
    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      position: relative;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      padding: 2.5rem 2rem;
      background:
        linear-gradient(135deg,
          rgba(245, 241, 232, 0.05) 0%,
          rgba(245, 241, 232, 0.02) 100%),
        rgba(17, 23, 42, 0.6);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--border-2);
      border-radius: 16px;
      box-shadow:
        0 1px 0 rgba(245, 241, 232, 0.18) inset,
        0 -1px 0 rgba(245, 241, 232, 0.06) inset,
        0 24px 60px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(212, 175, 55, 0.1),
        0 0 40px rgba(212, 175, 55, 0.08);
      animation: slideUp 0.6s cubic-bezier(0.34, 1.4, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%, var(--gold) 50%, transparent 100%);
      opacity: 0.5;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== Brand ===== */
    .brand {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .brand-mark {
      display: inline-flex;
      width: 64px;
      height: 64px;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, var(--gold), var(--gold-2));
      border: 2px solid var(--gold);
      box-shadow: 0 6px 20px var(--gold-glow);
      margin-bottom: 0.85rem;
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 6px 20px var(--gold-glow); }
      50%      { box-shadow: 0 6px 32px var(--gold-glow), 0 0 0 4px rgba(212, 175, 55, 0.1); }
    }

    .brand-mark svg {
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.4));
    }

    .brand-title {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--marble), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .brand-tag {
      font-family: var(--serif-italic);
      font-style: italic;
      font-size: 0.78rem;
      color: var(--gold);
      letter-spacing: 0.08em;
      margin-top: 0.25rem;
      opacity: 0.85;
    }

    /* ===== Tabs ===== */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: rgba(10, 14, 26, 0.6);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .tab {
      flex: 1;
      padding: 0.6rem;
      background: transparent;
      border: 0;
      color: var(--text-2);
      font-family: var(--serif);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      color: var(--bg);
      box-shadow: 0 4px 14px var(--gold-glow);
    }

    .tab:not(.active):hover {
      color: var(--gold);
      background: var(--gold-soft);
    }

    /* ===== Form ===== */
    .form {
      display: none;
      flex-direction: column;
      gap: 0.95rem;
    }
    .form.active { display: flex; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .field label {
      font-family: var(--serif);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .field-input {
      position: relative;
    }

    .field-input input {
      width: 100%;
      padding: 0.75rem 0.9rem 0.75rem 2.6rem;
      background: rgba(10, 14, 26, 0.6);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.9rem;
      transition: all 0.2s ease;
      outline: none;
    }

    .field-input input::placeholder {
      color: var(--text-3);
      font-family: var(--serif-italic);
      font-style: italic;
    }

    .field-input input:focus {
      border-color: var(--gold);
      background: rgba(10, 14, 26, 0.85);
      box-shadow: 0 0 0 3px var(--gold-soft);
    }

    .field-input .icon {
      position: absolute;
      top: 50%;
      left: 0.85rem;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
      transition: color 0.2s ease;
    }

    .field-input input:focus + .icon,
    .field-input:focus-within .icon { color: var(--gold); }

    .field-input .toggle-btn {
      position: absolute;
      top: 50%;
      right: 0.5rem;
      transform: translateY(-50%);
      background: transparent;
      border: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s ease;
    }
    .field-input .toggle-btn:hover {
      color: var(--gold);
      background: var(--gold-soft);
    }

    .forgot {
      font-family: var(--serif-italic);
      font-style: italic;
      font-size: 0.75rem;
      color: var(--text-3);
      text-decoration: none;
      letter-spacing: 0;
      text-transform: none;
      transition: color 0.15s ease;
    }
    .forgot:hover { color: var(--gold); }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-family: var(--serif);
      font-size: 0.78rem;
      color: var(--text-2);
      cursor: pointer;
      user-select: none;
    }

    .checkbox-row input {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--border-2);
      border-radius: 4px;
      background: rgba(10, 14, 26, 0.6);
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s ease;
    }
    .checkbox-row input:checked {
      background: var(--gold);
      border-color: var(--gold);
    }
    .checkbox-row input:checked::after {
      content: "✓";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--bg);
      font-size: 0.75rem;
      font-weight: 700;
    }

    /* ===== Submit ===== */
    .submit {
      width: 100%;
      padding: 0.85rem 1rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      color: var(--bg);
      border: 1px solid var(--gold);
      border-radius: 8px;
      font-family: var(--serif);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 22px var(--gold-glow);
      transition: all 0.2s ease;
      margin-top: 0.4rem;
      position: relative;
      overflow: hidden;
    }

    .submit::before {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: left 0.6s ease;
    }

    .submit:hover { transform: translateY(-2px); box-shadow: 0 14px 30px var(--gold-glow); }
    .submit:hover::before { left: 100%; }
    .submit:active { transform: translateY(0); }
    .submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ===== Divider ===== */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin: 1.25rem 0 0.95rem;
      color: var(--text-3);
      font-family: var(--serif-italic);
      font-style: italic;
      font-size: 0.78rem;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-2), transparent);
    }

    /* ===== Social ===== */
    .social {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      padding: 0.7rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--serif);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .social-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-soft);
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
    }

    /* ===== Footer link ===== */
    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-family: var(--serif-italic);
      font-style: italic;
      color: var(--text-3);
      font-size: 0.82rem;
    }
    .footer-link a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
      margin-left: 4px;
    }
    .footer-link a:hover { text-decoration: underline; }

    /* ===== Greek decorative laurel ===== */
    .laurel {
      text-align: center;
      color: var(--gold);
      font-size: 0.85rem;
      margin: 1.5rem 0 0;
      opacity: 0.55;
      letter-spacing: 0.5em;
    }

    /* ===== Status messages ===== */
    .status {
      padding: 0.7rem 0.85rem;
      border-radius: 6px;
      font-family: var(--serif-italic);
      font-style: italic;
      font-size: 0.82rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    .status.show { display: flex; animation: fadeIn 0.25s ease; }
    .status.error {
      background: rgba(155, 28, 28, 0.15);
      border: 1px solid rgba(155, 28, 28, 0.4);
      color: #f5b7b7;
    }
    .status.success {
      background: rgba(107, 142, 35, 0.15);
      border: 1px solid rgba(107, 142, 35, 0.4);
      color: #c5e69b;
    }

    /* ===== Mobile ===== */
    @media (max-width: 480px) {
      .auth-card {
        padding: 2rem 1.35rem;
        border-radius: 14px;
      }
      .brand-title { font-size: 1.2rem; }
      .social { grid-template-columns: 1fr; }
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="container">
    <main class="auth-card" role="main" aria-labelledby="auth-title">

      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="color: #0a0e1a;">
            <path d="M5 21v-7M19 21v-7M5 14h14M3 14h18M5 14V8h14v6M7 8V5l5-2 5 2v3" />
          </svg>
        </div>
        <h1 class="brand-title" id="auth-title">VanX Stream</h1>
        <div class="brand-tag">καλώς ήρθατε</div>
      </div>

      <div class="tabs" role="tablist">
        <button type="button" class="tab active" data-tab="login" role="tab" aria-selected="true">Masuk</button>
        <button type="button" class="tab" data-tab="register" role="tab" aria-selected="false">Daftar</button>
      </div>

      <div id="status-msg" class="status" role="alert" aria-live="polite"></div>

      <!-- LOGIN FORM -->
      <form class="form active" id="login-form" data-form="login" autocomplete="on" novalidate>
        <div class="field">
          <label for="login-email">Email atau Username</label>
          <div class="field-input">
            <input id="login-email" name="identifier" type="text" placeholder="alwi@vanx.dev" autocomplete="username" required />
            <span class="icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
              </svg>
            </span>
          </div>
        </div>

        <div class="field">
          <label for="login-password">
            Kata Sandi
            <a href="#" class="forgot" id="forgot-link">Lupa sandi?</a>
          </label>
          <div class="field-input">
            <input id="login-password" name="password" type="password" placeholder="Minimal 8 karakter" autocomplete="current-password" required minlength="8" />
            <span class="icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </span>
            <button type="button" class="toggle-btn" data-toggle="login-password" aria-label="Tampilkan sandi">
              <svg class="eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" name="remember" />
          Ingat saya selama 30 hari
        </label>

        <button type="submit" class="submit">
          <span class="submit-label">Masuk ke Akun</span>
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form class="form" id="register-form" data-form="register" autocomplete="on" novalidate>
        <div class="field">
          <label for="reg-name">Nama Lengkap</label>
          <div class="field-input">
            <input id="reg-name" name="name" type="text" placeholder="Contoh: Alwi Vanx" autocomplete="name" required minlength="2" />
            <span class="icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </span>
          </div>
        </div>

        <div class="field">
          <label for="reg-email">Email</label>
          <div class="field-input">
            <input id="reg-email" name="email" type="email" placeholder="kamu@email.com" autocomplete="email" required />
            <span class="icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
              </svg>
            </span>
          </div>
        </div>

        <div class="field">
          <label for="reg-password">Kata Sandi</label>
          <div class="field-input">
            <input id="reg-password" name="password" type="password" placeholder="Minimal 8 karakter" autocomplete="new-password" required minlength="8" />
            <span class="icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </span>
            <button type="button" class="toggle-btn" data-toggle="reg-password" aria-label="Tampilkan sandi">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" name="terms" required />
          Saya setuju dengan syarat &amp; ketentuan
        </label>

        <button type="submit" class="submit">
          <span class="submit-label">Buat Akun Baru</span>
        </button>
      </form>

      <div class="divider">atau lanjutkan dengan</div>

      <div class="social">
        <button type="button" class="social-btn" data-provider="google">
          <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          Google
        </button>
        <button type="button" class="social-btn" data-provider="github">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.57.1.78-.25.78-.55v-1.93c-3.2.7-3.87-1.54-3.87-1.54-.52-1.33-1.27-1.69-1.27-1.69-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.68 1.25 3.34.95.1-.74.4-1.25.72-1.54-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.16 1.18a10.93 10.93 0 0 1 5.75 0c2.2-1.49 3.16-1.18 3.16-1.18.62 1.58.23 2.75.11 3.04.74.81 1.18 1.84 1.18 3.1 0 4.43-2.7 5.41-5.27 5.69.41.36.78 1.06.78 2.13v3.16c0 .31.21.66.79.55C20.21 21.39 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z" />
          </svg>
          GitHub
        </button>
      </div>

      <div class="footer-link" id="switch-text">
        Belum punya akun?<a href="#" data-switch="register">Daftar gratis</a>
      </div>

      <div class="laurel" aria-hidden="true">✦ ✦ ✦</div>
    </main>
  </div>

  <script>
    // ===== Particle background =====
    (function spawnParticles() {
      const root = document.body;
      for (let i = 0; i < 14; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDelay = (Math.random() * 12) + 's';
        p.style.animationDuration = (8 + Math.random() * 8) + 's';
        p.style.opacity = (0.4 + Math.random() * 0.5).toString();
        root.appendChild(p);
      }
    })();

    // ===== Tab switching =====
    const tabs = document.querySelectorAll('.tab');
    const forms = document.querySelectorAll('.form');
    const switchText = document.getElementById('switch-text');

    function switchTab(tabName) {
      tabs.forEach(t => {
        const isActive = t.dataset.tab === tabName;
        t.classList.toggle('active', isActive);
        t.setAttribute('aria-selected', String(isActive));
      });
      forms.forEach(f => f.classList.toggle('active', f.dataset.form === tabName));
      switchText.innerHTML = tabName === 'login'
        ? 'Belum punya akun?<a href="#" data-switch="register">Daftar gratis</a>'
        : 'Sudah punya akun?<a href="#" data-switch="login">Masuk</a>';
      hideStatus();
    }

    tabs.forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
    document.addEventListener('click', (e) => {
      const link = e.target.closest('[data-switch]');
      if (link) {
        e.preventDefault();
        switchTab(link.dataset.switch);
      }
    });

    // ===== Toggle password visibility =====
    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.toggle);
        if (!target) return;
        const isHidden = target.type === 'password';
        target.type = isHidden ? 'text' : 'password';
        btn.setAttribute('aria-label', isHidden ? 'Sembunyikan sandi' : 'Tampilkan sandi');
      });
    });

    // ===== Status messages =====
    const statusEl = document.getElementById('status-msg');
    function showStatus(text, type = 'error') {
      statusEl.className = 'status show ' + type;
      statusEl.textContent = text;
      if (type === 'success') {
        setTimeout(hideStatus, 3500);
      }
    }
    function hideStatus() {
      statusEl.className = 'status';
      statusEl.textContent = '';
    }

    // ===== Submit handlers =====
    function setLoading(form, loading) {
      const btn = form.querySelector('.submit');
      const label = btn.querySelector('.submit-label');
      btn.disabled = loading;
      if (loading) {
        label.innerHTML = '<span class="spinner"></span>&nbsp;&nbsp;Memproses...';
      } else {
        label.textContent = form.dataset.form === 'login' ? 'Masuk ke Akun' : 'Buat Akun Baru';
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideStatus();
      const form = e.currentTarget;
      const data = new FormData(form);
      const identifier = String(data.get('identifier') || '').trim();
      const password = String(data.get('password') || '');
      if (!identifier || !password) {
        showStatus('Isi email/username dan kata sandi terlebih dahulu.');
        return;
      }
      if (password.length < 8) {
        showStatus('Kata sandi minimal 8 karakter.');
        return;
      }

      setLoading(form, true);
      try {
        // Try to call the Next.js API if available
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password, remember: data.get('remember') === 'on' }),
        }).catch(() => null);

        if (r && r.ok) {
          showStatus('Berhasil masuk! Mengarahkan...', 'success');
          setTimeout(() => { window.location.href = '/'; }, 800);
        } else {
          // Demo mode — store locally
          localStorage.setItem('vanx_user', JSON.stringify({ identifier, ts: Date.now() }));
          showStatus('Mode demo: tersimpan di browser. Mengarahkan ke beranda...', 'success');
          setTimeout(() => { window.location.href = '/'; }, 1000);
        }
      } catch (err) {
        showStatus('Gagal masuk. Coba lagi.');
      } finally {
        setLoading(form, false);
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideStatus();
      const form = e.currentTarget;
      const data = new FormData(form);
      const name = String(data.get('name') || '').trim();
      const email = String(data.get('email') || '').trim();
      const password = String(data.get('password') || '');
      if (!name || !email || !password) {
        showStatus('Lengkapi semua field.');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showStatus('Format email tidak valid.');
        return;
      }
      if (password.length < 8) {
        showStatus('Kata sandi minimal 8 karakter.');
        return;
      }
      if (data.get('terms') !== 'on') {
        showStatus('Setujui syarat & ketentuan untuk melanjutkan.');
        return;
      }

      setLoading(form, true);
      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        }).catch(() => null);

        if (r && r.ok) {
          showStatus('Akun berhasil dibuat! Mengarahkan...', 'success');
          setTimeout(() => { window.location.href = '/'; }, 800);
        } else {
          localStorage.setItem('vanx_user', JSON.stringify({ name, email, ts: Date.now() }));
          showStatus('Mode demo: akun tersimpan di browser. Mengarahkan...', 'success');
          setTimeout(() => { window.location.href = '/'; }, 1000);
        }
      } catch (err) {
        showStatus('Gagal mendaftar. Coba lagi.');
      } finally {
        setLoading(form, false);
      }
    });

    // ===== Social provider buttons =====
    document.querySelectorAll('[data-provider]').forEach(btn => {
      btn.addEventListener('click', () => {
        const provider = btn.dataset.provider;
        showStatus(`Login ${provider} belum dikonfigurasi. Hubungi developer untuk setup OAuth.`, 'error');
      });
    });

    // ===== Forgot password =====
    document.getElementById('forgot-link').addEventListener('click', (e) => {
      e.preventDefault();
      const email = prompt('Masukkan email Anda untuk reset sandi:');
      if (email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showStatus('Link reset sandi akan dikirim ke ' + email + ' (mode demo).', 'success');
      } else if (email) {
        showStatus('Format email tidak valid.');
      }
    });

    // ===== Auto-redirect if already logged in =====
    (function checkAuth() {
      const stored = localStorage.getItem('vanx_user');
      if (stored) {
        try {
          const u = JSON.parse(stored);
          if (u && Date.now() - u.ts < 30 * 24 * 60 * 60 * 1000) {
            // Show banner instead of auto-redirect (let user choose)
            const banner = document.createElement('div');
            banner.style.cssText = 'position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:var(--gold-soft);border:1px solid var(--gold);color:var(--gold);padding:0.55rem 1rem;border-radius:8px;font-family:var(--serif);font-size:0.78rem;z-index:100;backdrop-filter:blur(8px);';
            banner.innerHTML = `Sudah login sebagai <strong>${u.identifier || u.email || u.name}</strong> · <a href="/" style="color:var(--gold-light);text-decoration:underline;">Lanjut ke beranda</a>`;
            document.body.appendChild(banner);
          }
        } catch {}
      }
    })();
  </script>

</body>
</html>
