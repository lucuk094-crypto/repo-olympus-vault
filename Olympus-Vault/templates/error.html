<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Error - Olympus Vault</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="greek-border-top"></div>

    <div class="hero">
        <div class="card" style="max-width: 500px; width: 90%; margin: 0 auto; text-align: center;">
            <div style="font-size: 5rem; color: var(--gold-dark); margin-bottom: 1rem;">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1 class="greek-title" style="font-size: 2rem; margin-bottom: 1rem;">Oops!</h1>
            <p style="color: var(--marble); font-size: 1.1rem; margin-bottom: 2rem;">
                {{ message }}
            </p>
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> Kembali ke Beranda
            </a>
        </div>
    </div>

    <div class="greek-border-bottom"></div>
</body>
</html>
