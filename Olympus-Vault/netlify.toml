[build]
  command = "pip install -r requirements.txt"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from = "/static/*"
  to = "/static/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/backend/app.py"
  status = 200
  force = true

[functions]
  directory = "backend"
  included_files = ["templates/**", "static/**"]
