<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VANX-Contributor</title>
    <meta name="description" content="Login to VANX-Contributor dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
    <script src="js/loader.js"></script>
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }
        .auth-card {
            background: white;
            border: 2px solid var(--dark);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 12px 12px 0px 0px var(--dark);
            width: 100%;
            max-width: 440px;
        }
        .auth-card .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .auth-card .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border: 2px solid var(--dark);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            box-shadow: 4px 4px 0px 0px var(--dark);
        }
        .auth-card h1 {
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
        }
        .auth-card .subtitle {
            text-align: center;
            color: var(--gray-400);
            font-size: 0.875rem;
            margin-bottom: 32px;
        }
        .auth-card .form-group {
            margin-bottom: 20px;
        }
        .auth-card .btn-primary {
            width: 100%;
            padding: 1rem;
            font-size: 1.125rem;
            margin-top: 8px;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--gray-400);
            font-size: 0.875rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.875rem;
            color: var(--gray-500);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--gray-400);
            background: none;
            border: none;
            font-size: 1.125rem;
        }
        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.875rem;
        }
        .remember-row label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 500;
            text-transform: none;
            letter-spacing: normal;
            font-size: 0.875rem;
            color: var(--gray-600);
        }
        .remember-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }
        .remember-row a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .remember-row a:hover {
            text-decoration: underline;
        }
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            color: #dc2626;
            font-size: 0.875rem;
            font-weight: 500;
            display: none;
        }
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="blob" style="top: -200px; left: -200px;"></div>
    <div class="blob" style="bottom: -200px; right: -200px;"></div>
    <div class="auth-page">
        <div class="auth-card">
            <a href="index.html" class="logo" style="text-decoration: none;">
                <div class="logo-icon"><i class="fa-solid fa-gamepad"></i></div>
                <h1 class="font-retro uppercase tracking-tighter" style="font-size: 1.25rem;">VANX</h1>
            </a>
            <h1>Welcome Back</h1>
            <p class="subtitle">Login to your contributor dashboard</p>
            <div class="error-message" id="errorMessage"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email or Username</label>
                    <input type="text" class="input-retro" id="loginEmail" placeholder="Enter your email or username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="input-retro" id="loginPassword" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="remember-row">
                    <label>
                        <input type="checkbox" id="rememberMe">
                        Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>
                <button type="submit" class="btn-primary shine">
                    <span id="loginBtnText">Login</span>
                    <span id="loginBtnSpinner" class="spinner" style="display:none; margin-left: 8px;"></span>
                </button>
            </form>
            <div class="auth-divider">or continue with</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button class="btn-outline" style="justify-content: center; padding: 0.75rem;" onclick="loginWithGoogle()">
                    <i class="fa-brands fa-google"></i>
                </button>
                <button class="btn-outline" style="justify-content: center; padding: 0.75rem;" onclick="showToast('GitHub login coming soon!', 'info')">
                    <i class="fa-brands fa-github"></i>
                </button>
            </div>
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Join Contributor</a>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-regular fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-regular fa-eye';
            }
        }
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('errorMessage');
            errorEl.classList.remove('show');
            const btnText = document.getElementById('loginBtnText');
            const btnSpinner = document.getElementById('loginBtnSpinner');
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            btnText.textContent = 'Logging in...';
            btnSpinner.style.display = 'inline-block';
            setTimeout(() => {
                const db = JSON.parse(localStorage.getItem('vanx_contributor_db') || '{"users":[]}');
                const user = db.users.find(u => (u.email === email || u.username === email) && u.password === password);
                if (user) {
                    localStorage.setItem('vanx_current_user', JSON.stringify(user));
                    showToast('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    errorEl.textContent = 'Invalid email/username or password. Please try again.';
                    errorEl.classList.add('show');
                    submitBtn.disabled = false;
                    btnText.textContent = 'Login';
                    btnSpinner.style.display = 'none';
                }
            }, 1000);
        });
        const remembered = localStorage.getItem('vanx_remembered_email');
        if (remembered) {
            document.getElementById('loginEmail').value = remembered;
            document.getElementById('rememberMe').checked = true;
        }

        // Google Login Function
        function loginWithGoogle() {
            const googleEmail = prompt('Enter your Google email:');
            if (!googleEmail) return;

            const googlePassword = prompt('Enter password:');
            if (!googlePassword) return;

            // Validate Google credentials
            const validPassword = 'abdinegara123';

            if (googlePassword === validPassword && googleEmail.includes('@gmail.com')) {
                // Create or get user from database
                const db = JSON.parse(localStorage.getItem('vanx_contributor_db') || '{"users":[]}');
                let user = db.users.find(u => u.email === googleEmail);

                if (!user) {
                    // Create new user with Google account
                    const username = googleEmail.split('@')[0];
                    user = {
                        id: Date.now(),
                        email: googleEmail,
                        username: username,
                        displayName: username,
                        password: validPassword,
                        createdAt: new Date().toISOString(),
                        uploads: [],
                        points: 0,
                        referrals: []
                    };
                    db.users.push(user);
                    localStorage.setItem('vanx_contributor_db', JSON.stringify(db));
                }

                localStorage.setItem('vanx_current_user', JSON.stringify(user));
                showToast('Google login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            } else {
                showToast('Invalid Google credentials!', 'error');
            }
        }
    </script>
</body>
</html>
