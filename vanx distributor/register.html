<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - VANX-Contributor</title>
    <meta name="description" content="Join VANX-Contributor as a contributor">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
    <script src="js/loader.js"></script>
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }
        .auth-card {
            background: white;
            border: 2px solid var(--dark);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 12px 12px 0px 0px var(--dark);
            width: 100%;
            max-width: 480px;
        }
        .auth-card .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            text-decoration: none;
        }
        .auth-card .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border: 2px solid var(--dark);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            box-shadow: 4px 4px 0px 0px var(--dark);
        }
        .auth-card h1 {
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
        }
        .auth-card .subtitle {
            text-align: center;
            color: var(--gray-400);
            font-size: 0.875rem;
            margin-bottom: 32px;
        }
        .auth-card .form-group {
            margin-bottom: 20px;
        }
        .auth-card .btn-primary {
            width: 100%;
            padding: 1rem;
            font-size: 1.125rem;
            margin-top: 8px;
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.875rem;
            color: var(--gray-500);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--gray-400);
            background: none;
            border: none;
            font-size: 1.125rem;
        }
        .terms-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.875rem;
            color: var(--gray-500);
        }
        .terms-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: var(--primary);
            flex-shrink: 0;
        }
        .terms-row a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .referral-badge {
            background: var(--accent);
            color: var(--dark);
            border: 2px solid var(--dark);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .password-strength {
            height: 4px;
            background: var(--gray-200);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }
        .password-strength .fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
            border-radius: 4px;
        }
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            color: #dc2626;
            font-size: 0.875rem;
            font-weight: 500;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        @media (max-width: 500px) {
            .auth-card { padding: 24px; }
            .name-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="blob" style="top: -200px; right: -200px;"></div>
    <div class="blob" style="bottom: -200px; left: -200px;"></div>
    <div class="auth-page">
        <div class="auth-card">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fa-solid fa-gamepad"></i></div>
                <h1 class="font-retro uppercase tracking-tighter" style="font-size: 1.25rem; color: var(--gray-800);">VANX</h1>
            </a>
            <h1>Join as Contributor</h1>
            <p class="subtitle">Start uploading and earning rewards today</p>
            <div class="error-message" id="errorMessage"></div>
            <div id="referralBadge" class="referral-badge" style="display:none;">
                <i class="fa-solid fa-gift"></i>
                <span>You were invited by a friend! Earn <strong>+500 bonus points</strong> when your first upload is approved.</span>
            </div>
            <form id="registerForm">
                <div class="name-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" class="input-retro" id="regFirstName" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" class="input-retro" id="regLastName" placeholder="Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="input-retro" id="regUsername" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="input-retro" id="regEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="input-retro" id="regPassword" placeholder="Create a strong password" required oninput="checkPasswordStrength(this.value)">
                        <button type="button" class="toggle-password" onclick="togglePassword('regPassword', this)">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="fill" id="passwordStrengthFill"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="input-retro" id="regConfirmPassword" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('regConfirmPassword', this)">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="terms-row">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms" style="font-weight: 400; text-transform: none; letter-spacing: normal; font-size: 0.875rem; color: var(--gray-500); cursor: pointer;">
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>
                <button type="submit" class="btn-primary shine">
                    <span id="regBtnText">Create Account</span>
                    <span id="regBtnSpinner" class="spinner" style="display:none; margin-left: 8px;"></span>
                </button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const referralCode = urlParams.get('ref');
        if (referralCode) {
            document.getElementById('referralBadge').style.display = 'flex';
            localStorage.setItem('vanx_referral_code', referralCode);
        }
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-regular fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-regular fa-eye';
            }
        }
        function checkPasswordStrength(password) {
            const fill = document.getElementById('passwordStrengthFill');
            let strength = 0;
            let color = '#ef4444';
            if (password.length >= 6) strength += 20;
            if (password.length >= 10) strength += 20;
            if (/[A-Z]/.test(password)) strength += 20;
            if (/[0-9]/.test(password)) strength += 20;
            if (/[^A-Za-z0-9]/.test(password)) strength += 20;
            if (strength >= 80) color = '#10b981';
            else if (strength >= 60) color = '#f59e0b';
            else if (strength >= 40) color = '#f97316';
            fill.style.width = strength + '%';
            fill.style.background = color;
        }
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const firstName = document.getElementById('regFirstName').value.trim();
            const lastName = document.getElementById('regLastName').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            const errorEl = document.getElementById('errorMessage');
            errorEl.classList.remove('show');
            if (password !== confirmPassword) {
                errorEl.textContent = 'Passwords do not match!';
                errorEl.classList.add('show');
                return;
            }
            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters!';
                errorEl.classList.add('show');
                return;
            }
            if (!agreeTerms) {
                errorEl.textContent = 'You must agree to the Terms of Service!';
                errorEl.classList.add('show');
                return;
            }
            const btnText = document.getElementById('regBtnText');
            const btnSpinner = document.getElementById('regBtnSpinner');
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            btnText.textContent = 'Creating account...';
            btnSpinner.style.display = 'inline-block';
            setTimeout(() => {
                const db = JSON.parse(localStorage.getItem('vanx_contributor_db') || '{"users":[],"uploads":[],"referrals":[]}');
                if (db.users.find(u => u.email === email)) {
                    errorEl.textContent = 'Email already registered!';
                    errorEl.classList.add('show');
                    submitBtn.disabled = false;
                    btnText.textContent = 'Create Account';
                    btnSpinner.style.display = 'none';
                    return;
                }
                if (db.users.find(u => u.username === username)) {
                    errorEl.textContent = 'Username already taken!';
                    errorEl.classList.add('show');
                    submitBtn.disabled = false;
                    btnText.textContent = 'Create Account';
                    btnSpinner.style.display = 'none';
                    return;
                }
                const refCode = localStorage.getItem('vanx_referral_code');
                const refBonus = refCode ? 50 : 0;
                const newUser = {
                    id: 'user_' + Date.now(),
                    name: firstName + (lastName ? ' ' + lastName : ''),
                    username: username,
                    email: email,
                    password: password,
                    bio: '',
                    refCode: 'VANX' + Math.random().toString(36).substring(2, 6).toUpperCase(),
                    referralCount: 0,
                    joinedAt: new Date().toISOString()
                };
                db.users.push(newUser);
                localStorage.setItem('vanx_contributor_db', JSON.stringify(db));
                localStorage.setItem('vanx_current_user', JSON.stringify(newUser));
                if (refCode) {
                    const referrer = db.users.find(u => u.refCode === refCode);
                    if (referrer) {
                        db.referrals.push({
                            id: Date.now().toString(),
                            userId: referrer.id,
                            referredUserId: newUser.id,
                            name: newUser.name,
                            joinedAt: new Date().toISOString()
                        });
                        referrer.referralCount = (referrer.referralCount || 0) + 1;
                        localStorage.setItem('vanx_contributor_db', JSON.stringify(db));
                    }
                    localStorage.removeItem('vanx_referral_code');
                }
                showToast('Account created successfully! +' + refBonus + ' bonus points', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            }, 1000);
        });
    </script>
</body>
</html>
